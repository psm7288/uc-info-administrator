<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header(pageTitle, pageLabel)" class="header">
    <div class="header-left">
        <button id="menuBtn" class="icon-btn mobile-only" type="button">☰</button>

        <div>
            <span th:text="${pageLabel}">Dashboard</span>
            <h2 th:text="${pageTitle}">관리자 대시보드</h2>
        </div>
    </div>

    <div class="header-right">
        <div class="search-area">
            <input type="text" placeholder="공지, 학생, 장학금 검색" />
            <button type="button">검색</button>
        </div>

        <button id="openNoticeDrawer" class="icon-btn notice-icon" type="button">
            <i></i>
            알림
        </button>

        <a class="secondary-btn" th:href="@{/notices/new}">
            공지 작성
        </a>

        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button class="line-btn logout-link" type="submit">로그아웃</button>
        </form>
    </div>
</header>
</body>
</html>
