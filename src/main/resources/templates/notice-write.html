<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: head('공지 작성')}"></th:block>

    <link rel="stylesheet" th:href="@{/css/common/editor.css}" />
    <link rel="stylesheet" th:href="@{/css/pages/notice.css}" />
</head>
<body>
<div class="admin-view">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="main-area">
        <div th:replace="~{fragments/header :: header('공지 작성', 'Notice Write')}"></div>

        <section class="panel notice-write-panel">
            <div class="panel-head">
                <div>
                    <h3>공지 작성</h3>
                    <p>학생 앱에 노출될 공식 공지를 작성합니다.</p>
                </div>

                <a class="line-btn" th:href="@{/notices}">
                    목록으로
                </a>
            </div>

            <form class="notice-form" th:action="@{/notices}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="notice-form-grid">
                    <div class="field full">
                        <label for="title">공지 제목</label>
                        <input
                                id="title"
                                name="title"
                                type="text"
                                placeholder="공지 제목을 입력하세요"
                        />
                    </div>

                    <div class="field">
                        <label for="category">카테고리</label>
                        <select id="category" name="category">
                            <option value="DEPARTMENT">학과 공지</option>
                            <option value="ACADEMIC">학사 공지</option>
                            <option value="SCHOLARSHIP">장학 공지</option>
                            <option value="EVENT">행사 공지</option>
                            <option value="EMPLOYMENT">취업 공지</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="targetDepartment">대상 학과</label>
                        <select id="targetDepartment" name="targetDepartment">
                            <option value="ALL">전체 학과</option>
                            <option value="COMPUTER">컴퓨터공학과</option>
                            <option value="ELECTRONIC">전기전자공학과</option>
                            <option value="MECHANICAL">기계공학부</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="targetGrade">대상 학년</label>
                        <select id="targetGrade" name="targetGrade">
                            <option value="ALL">전체 학년</option>
                            <option value="1">1학년</option>
                            <option value="2">2학년</option>
                            <option value="3">3학년</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="priority">공지 중요도</label>
                        <select id="priority" name="priority">
                            <option value="NORMAL">일반 공지</option>
                            <option value="IMPORTANT">중요 공지</option>
                            <option value="URGENT">긴급 공지</option>
                        </select>
                    </div>

                    <div class="field">
                        <label for="startDate">게시 시작일</label>
                        <input id="startDate" name="startDate" type="date" />
                    </div>

                    <div class="field">
                        <label for="endDate">게시 종료일</label>
                        <input id="endDate" name="endDate" type="date" />
                    </div>

                    <div class="field full">
                        <label>공지 내용</label>
                        <div th:replace="~{fragments/editor :: noticeEditor}"></div>
                    </div>

                    <div class="field full">
                        <label for="attachment">첨부파일</label>
                        <input id="attachment" name="attachment" type="file" />
                        <p class="field-help">
                            PDF, 이미지, 신청서 파일 등을 첨부할 수 있습니다.
                        </p>
                    </div>
                </div>

                <div class="form-actions notice-actions">
                    <button class="line-btn" type="button" data-modal="previewModal">
                        미리보기
                    </button>

                    <button class="secondary-btn" type="submit" name="status" value="DRAFT">
                        임시 저장
                    </button>

                    <button class="primary-btn" type="submit" name="status" value="PUBLISHED">
                        게시하기
                    </button>
                </div>
            </form>
        </section>
    </main>
</div>

<div th:replace="~{fragments/modals :: modals}"></div>
<div th:replace="~{fragments/toast :: toast}"></div>

<script th:src="@{/js/common/toast.js}"></script>
<script th:src="@{/js/common/modal.js}"></script>
<script th:src="@{/js/common/sidebar.js}"></script>
<script th:src="@{/js/common/common.js}"></script>
<script th:src="@{/js/common/editor.js}"></script>
<script th:src="@{/js/pages/notice-write.js}"></script>
</body>
</html>
